appId: com.ontarget
productName: OnTarget
directories:
  buildResources: resources
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.*}'
asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/**
win:
  # nsis = installer, zip = draagbare versie (uitpakken en draaien, bv. vanaf USB-stick)
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  executableName: OnTarget
  artifactName: OnTarget-${version}.${ext}
nsis:
  artifactName: OnTarget-Setup-${version}.exe
  shortcutName: OnTarget
  uninstallDisplayName: OnTarget
  createDesktopShortcut: always
